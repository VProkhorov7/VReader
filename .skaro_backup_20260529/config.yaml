git:
  auto_commit: false
  auto_init: true
  auto_push: false
import:
  max_file_size: 100000
  token_limit: 200000
lang: ru
llm:
  api_key_env: ANTHROPIC_API_KEY
  base_url: https://api.tokenator.top/anthropic
  max_tokens: 8192
  model: claude-sonnet-4-6
  provider: anthropic
  temperature: 0.3
project_description: Multi-format iOS/iPadOS e-reader. Swift 6, SwiftUI, SwiftData,
  iOS 17+.
project_name: VReader
roles:
  architect:
    api_key_env: ANTHROPIC_API_KEY
    base_url: https://api.tokenator.top/anthropic
    max_tokens: 8192
    model: claude-sonnet-4-6
    provider: anthropic
    temperature: 0.3
  coder:
    api_key_env: ANTHROPIC_API_KEY
    base_url: https://api.tokenator.top/anthropic
    max_tokens: 8192
    model: claude-sonnet-4-6
    provider: anthropic
    temperature: 0.3
  reviewer:
    api_key_env: ANTHROPIC_API_KEY
    base_url: https://api.tokenator.top/anthropic
    max_tokens: 8192
    model: claude-haiku-4-5
    provider: anthropic
    temperature: 0.3
theme: dark
ui:
  auto_open_browser: true
